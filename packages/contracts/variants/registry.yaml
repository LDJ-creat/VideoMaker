variants:
  high_click:
    label: 高点击版
    enabled: true
    description: 更强 hook、更快节奏、前 3 秒信息密度更高
    agentOverrides:
      storyboard_writer:
        hookStrength: high
        tempo: fast
        subtitleDensity: medium
      gap_planner:
        preferProviders: [stock_media_search, hyperframes_material, asset_reuse, image_generation, video_generation]
        stockMediaPriority: high
        videoGenPriority: low
  high_conversion:
    label: 高转化版
    enabled: true
    description: 卖点提前、proof/CTA 加重、包装偏卖点卡
    agentOverrides:
      storyboard_writer:
        sellingPointOrder: early
        ctaWeight: high
        subtitleDensity: high
      gap_planner:
        preferProviders: [stock_media_search, hyperframes_material, asset_reuse, image_generation, video_generation]
        stockMediaPriority: high
        videoGenPriority: low
  fast_paced:
    label: 高节奏版
    enabled: false
    description: ""
    agentOverrides: {}
  premium:
    label: 高质感版
    enabled: false
    description: ""
    agentOverrides: {}
